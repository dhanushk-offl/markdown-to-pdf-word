name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: Compile
        run: npm run compile
      - name: Test
        run: npm test
      - name: Package VSIX
        run: npx --yes @vscode/vsce package --no-dependencies || npx --yes @vscode/vsce package
      - uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: "*.vsix"
          if-no-files-found: warn
